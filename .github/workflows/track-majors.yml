name: Track Previous Major Prices

on:
  schedule:
    - cron: '0 6 */2 * *'  # Every 2 days at 06:00 UTC (4:00 PM AEST)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Fetch previous major sticker prices
        run: bun track-majors.ts

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add major_price_history.json
          git diff --staged --quiet || git commit -m "Track major prices $(date -u +%Y-%m-%d)"
          git pull --rebase || true
          git push || (git pull --rebase && git push)
