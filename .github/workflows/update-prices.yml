name: Update Sticker Prices

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes (96x/day)
  workflow_dispatch: # Manual trigger

concurrency:
  group: update-prices
  cancel-in-progress: false  # Let running jobs finish, queue new ones

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build inventory overview
        run: bun inventory_tracker.ts
        env:
          DISCORD_ALERTS: ${{ secrets.DISCORD_ALERTS }}
          DISCORD_PORTFOLIO: ${{ secrets.DISCORD_PORTFOLIO }}
          DISCORD_MILESTONES: ${{ secrets.DISCORD_MILESTONES }}
          DISCORD_SIGNALS: ${{ secrets.DISCORD_SIGNALS }}
          DISCORD_WEEKLY: ${{ secrets.DISCORD_WEEKLY }}
          DISCORD_SKINPORT: ${{ secrets.DISCORD_SKINPORT }}
          DISCORD_MAJORS: ${{ secrets.DISCORD_MAJORS }}
          STEAMANALYST_API_KEY: ${{ secrets.STEAMANALYST_API_KEY }}

      - name: Fetch sticker prices and build Budapest page
        run: bun tracker.ts
        env:
          DISCORD_ALERTS: ${{ secrets.DISCORD_ALERTS }}
          DISCORD_PORTFOLIO: ${{ secrets.DISCORD_PORTFOLIO }}
          DISCORD_MILESTONES: ${{ secrets.DISCORD_MILESTONES }}
          DISCORD_SIGNALS: ${{ secrets.DISCORD_SIGNALS }}
          DISCORD_WEEKLY: ${{ secrets.DISCORD_WEEKLY }}
          DISCORD_SKINPORT: ${{ secrets.DISCORD_SKINPORT }}
          DISCORD_MAJORS: ${{ secrets.DISCORD_MAJORS }}
          STEAMANALYST_API_KEY: ${{ secrets.STEAMANALYST_API_KEY }}

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          for f in index.html budapest.html inventory_price_history.json sticker_price_history.json budapest2025_stickers.csv sticker_images.json major_price_history.json; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --staged --quiet || git commit -m "Update prices $(date -u +%Y-%m-%d-%H%M)"
          git push
