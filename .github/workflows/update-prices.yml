name: Update Sticker Prices

on:
  schedule:
    # Run daily at 10:00 UTC (8:00 PM AEST)
    - cron: '0 10 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Fetch prices and build HTML
        run: bun tracker.ts

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sticker_price_history.json budapest2025_stickers.csv
          git diff --staged --quiet || git commit -m "Update prices $(date -u +%Y-%m-%d)"
          git push
